<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} - Last.fm Stats</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .list-group-item.active { background-color: #0d6efd; border-color: #0d6efd; }
        pre { font-size: 12px; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-gear-fill me-2"></i>Admin Panel
            </span>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('scrobbles.library_scrobbles') }}">
                    <i class="bi bi-house"></i> Back to App
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'admin.admin_dashboard' %}active{% endif %}"
                   href="{{ url_for('admin.admin_dashboard') }}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'admin.admin_notifications' %}active{% endif %}"
                   href="{{ url_for('admin.admin_notifications') }}">
                    Notifications
                    <span id="notif-badge" class="badge bg-danger{% if unread_count == 0 %} d-none{% endif %}">{{ unread_count }}</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'admin.admin_logs' %}active{% endif %}"
                   href="{{ url_for('admin.admin_logs') }}">Logs</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'admin.admin_database' or request.endpoint == 'admin.admin_database_execute' %}active{% endif %}"
                   href="{{ url_for('admin.admin_database') }}">Database</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'admin.admin_health' %}active{% endif %}"
                   href="{{ url_for('admin.admin_health') }}">Health</a>
            </li>
        </ul>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Update notification badge count periodically
    function updateNotificationBadge() {
        fetch("{{ url_for('admin.admin_notifications_count') }}")
            .then(response => response.json())
            .then(data => {
                const badge = document.getElementById('notif-badge');
                if (data.count > 0) {
                    badge.textContent = data.count;
                    badge.classList.remove('d-none');
                } else {
                    badge.classList.add('d-none');
                }
            })
            .catch(error => {
                console.error('Failed to update notification badge:', error);
            });
    }

    // Update badge every 30 seconds
    setInterval(updateNotificationBadge, 30000);

    // Initial update on page load
    document.addEventListener('DOMContentLoaded', function() {
        // Skip update if we're on the notifications page (already has fresh data)
        if (!window.location.pathname.includes('/admin/notifications')) {
            updateNotificationBadge();
        }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
