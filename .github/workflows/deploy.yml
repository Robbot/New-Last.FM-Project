name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://localhost:8001
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT || 22 }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script_stop: true
          script: |
            set -e

            # Change to app directory
            cd /home/roju/New-Last.FM-Project

            # Pull latest changes
            echo ">>> Pulling latest changes..."
            git pull origin main

            # Activate virtual environment and install/update dependencies
            echo ">>> Updating dependencies..."
            source .venv/bin/activate
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet

            # Backup database before deployment
            echo ">>> Backing up database..."
            python -m app.services.backup_db

            # Run database migrations if needed
            echo ">>> Checking database schema..."
            # Add migration check here if needed

            # Restart the application service
            echo ">>> Restarting lastfm service..."
            sudo systemctl restart lastfm

            # Wait and check service status
            sleep 3
            sudo systemctl is-active --quiet lastfm && echo ">>> Service is running!" || echo ">>> Service failed to start!"

            # Run health check
            echo ">>> Running health check..."
            curl -f http://localhost:8001/ || exit 1

            echo ">>> Deployment complete!"
            echo ">>> Access production at: http://localhost:8001"
